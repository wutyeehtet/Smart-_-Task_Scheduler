<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Task Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🤖 AI-Based Smart Task Scheduler</h2>

    <div class="card bg-primary text-white mb-4 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>💡 AI Daily Recommendation</span>
            <button id="generateAiBtn" class="btn btn-warning btn-sm fw-bold">✨ Generate AI Recommendation</button>
        </div>
        <div class="card-body">
            <h5 class="card-title" id="ai-focus-task">Click the "Generate" button to get AI suggestions...</h5>
            <p class="card-text" id="ai-tip"></p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header bg-success text-white">Add New Task</div>
                <div class="card-body">
                    <form id="taskForm">
                        <div class="mb-3">
                            <label class="form-label">Task Title</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Deadline</label>
                            <input type="date" class="form-control" id="deadline">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Duration (minutes)</label>
                            <input type="number" class="form-control" id="duration" value="60">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" class="form-control" id="category" placeholder="e.g. Study, Project">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Add Task</button>
                    </form>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-info text-white">Task Priority Analytics</div>
                <div class="card-body">
                    <canvas id="priorityChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-dark text-white">Your Tasks (Pending)</div>
                <div class="card-body">
                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Deadline</th>
                                <th>AI Priority</th>
                                <th>Category</th>
                                <th>Actions</th> </tr>
                        </thead>
                        <tbody id="taskList">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart = null;

 
    document.getElementById('generateAiBtn').addEventListener('click', async function() {
        const btn = this;
        btn.innerText = "Generating..."; 
        btn.disabled = true;

        const res = await fetch('/recommendation');
        const data = await res.json();
        
        if(data.message) {
            document.getElementById('ai-focus-task').innerText = data.message;
            document.getElementById('ai-tip').innerText = "";
        } else {
            document.getElementById('ai-focus-task').innerText = "🎯 Focus: " + data.recommendation_message;
            document.getElementById('ai-tip').innerText = "💡 Tip: " + data.productivity_tip;
        }

        btn.innerText = "✨ Generate AI Recommendation";
        btn.disabled = false;
    });

  
    function renderChart(tasks) {
        let high = 0, medium = 0, low = 0;
        tasks.forEach(task => {
            if (task.priority >= 8) high++;
            else if (task.priority >= 5) medium++;
            else low++;
        });

        const ctx = document.getElementById('priorityChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['High (8-10)', 'Medium (5-7)', 'Low (1-4)'],
                datasets: [{
                    data: [high, medium, low],
                    backgroundColor: ['#dc3545', '#ffc107', '#28a745']
                }]
            }
        });
    }

    async function loadTasks() {
        const res = await fetch('/tasks');
        const data = await res.json();
        
        const tbody = document.getElementById('taskList');
        tbody.innerHTML = "";
        data.tasks.forEach(task => {
            let badgeColor = task.priority >= 8 ? 'bg-danger' : (task.priority >= 5 ? 'bg-warning text-dark' : 'bg-success');
            
            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${task.title}</td>
                    <td>${task.deadline || '-'}</td>
                    <td><span class="badge ${badgeColor}">${task.priority} / 10</span></td>
                    <td>${task.category || '-'}</td>
                    <td>
                        <button onclick="markTaskDone(${task.id})" class="btn btn-sm btn-outline-success me-1">✓ Done</button>
                        <button onclick="deleteTask(${task.id})" class="btn btn-sm btn-outline-danger">✗ Delete</button>
                    </td>
                </tr>
            `;
        });
        renderChart(data.tasks);
    }

    async function markTaskDone(taskId) {
        await fetch(`/tasks/${taskId}/done`, { method: 'PUT' });
        loadTasks(); 
    }

   
    async function deleteTask(taskId) {
        if(confirm("Are you sure you want to delete this task?")) {
            await fetch(`/tasks/${taskId}`, { method: 'DELETE' });
            loadTasks(); 
        }
    }


    document.getElementById('taskForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        
        const btn = this.querySelector('button[type="submit"]');
        btn.innerText = "Adding Task...";
        btn.disabled = true;

        const newTask = {
            title: document.getElementById('title').value,
            deadline: document.getElementById('deadline').value,
            duration: document.getElementById('duration').value,
            category: document.getElementById('category').value
        };

        await fetch('/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(newTask)
        });

        document.getElementById('taskForm').reset(); 
        loadTasks(); 

        btn.innerText = "Add Task";
        btn.disabled = false;
    });

    window.onload = () => {
        loadTasks();
    };
</script>
</body>
</html>
